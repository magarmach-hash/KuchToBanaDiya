<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC_IN_PROGRESS</title>
    <style>
        body {
            background-color: #ffffff;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
        }

        /* Brutalist Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000; /* Pure black line */
            border-radius: 0%; /* Square spinner for that glitchy look */
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80% { content: '...'; }
        }
        
        a {
            position: fixed;
            bottom: 20px;
            color: #ccc;
            text-decoration: none;
            font-size: 10px;
        }
        
        a:hover { color: #000; }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div class="status-text">Loading<span class="dots"></span></div>
    
    <a href="../index.html"></a>

</body>
</html>
